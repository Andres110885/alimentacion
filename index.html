<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1411">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mi Cocina</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0f1411; --bg2:#161d18; --card:#1b241e; --card2:#212c24;
    --line:#2c3a30; --txt:#eaf2ec; --muted:#9bb0a2; --muted2:#74897c;
    --acc:#46c787; --acc-d:#2f9c66; --warn:#e6b450; --danger:#e06c6c;
    --fish:#5aa9e6; --veg:#5ccb8f; --egg:#e6c34a; --meat:#e0786c;
    --radius:16px; --radius-s:11px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px; line-height:1.45; padding-bottom:78px;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{margin:0;font-weight:700}
  button{font-family:inherit;cursor:pointer;border:none;color:inherit;font-size:15px}
  input,select,textarea{font-family:inherit;font-size:16px}
  ::-webkit-scrollbar{height:0;width:0}

  /* top bar */
  .topbar{
    position:sticky;top:0;z-index:40;background:rgba(15,20,17,.92);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    padding:calc(14px + env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:10px;
  }
  .topbar .logo{font-size:20px}
  .topbar h1{font-size:19px;letter-spacing:.2px;flex:1}
  .topbar .sub{font-size:12px;color:var(--muted);font-weight:500}
  .setbtn{background:var(--card2);border:1px solid var(--line);width:40px;height:40px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
  .setbtn:active{transform:scale(.95)}
  .setbtn.alert::after{content:'';position:absolute;top:-1px;right:-1px;width:11px;height:11px;border-radius:50%;background:var(--warn);border:2px solid var(--bg)}

  .view{padding:16px;display:none;max-width:760px;margin:0 auto}
  .view.active{display:block}
  .view-title{font-size:15px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:4px 2px 12px;font-weight:600}

  /* buttons */
  .btn{background:var(--acc);color:#06150d;font-weight:700;padding:12px 16px;border-radius:var(--radius-s);display:inline-flex;align-items:center;gap:8px;justify-content:center}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--card2);color:var(--txt);font-weight:600}
  .btn.sm{padding:8px 12px;font-size:14px}
  .btn.block{width:100%}
  .btn.danger{background:var(--danger);color:#1a0808}
  .row-btns{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}

  /* recipe blocks */
  .block{margin-bottom:22px}
  .block-head{display:flex;align-items:center;gap:8px;margin:0 2px 11px}
  .block-head h2{font-size:17px}
  .block-head .count{color:var(--muted2);font-size:13px;font-weight:600}
  .block.probar .block-head h2{color:var(--warn)}
  .hscroll{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 6px;scroll-snap-type:x mandatory}
  .rcard{flex:0 0 158px;width:158px;background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);scroll-snap-align:start}
  .rcard:active{transform:scale(.98)}
  .rcard .thumb{height:104px;background:var(--card2);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:34px;position:relative}
  .rcard .cat{position:absolute;top:7px;left:7px;font-size:10px;font-weight:700;padding:3px 7px;border-radius:20px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
  .rcard .body{padding:9px 10px 11px}
  .rcard .body h3{font-size:13.5px;line-height:1.25;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px}
  .rcard .meta{font-size:11px;color:var(--muted2);display:flex;gap:9px}
  .empty{color:var(--muted2);font-size:14px;background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);padding:22px 16px;text-align:center}
  .search{width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);padding:12px 14px;border-radius:var(--radius-s);margin-bottom:16px}

  /* rejilla de bloques (pantalla principal) */
  .bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .bcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 10px;display:flex;flex-direction:column;align-items:flex-start;gap:4px;text-align:left;min-height:96px;justify-content:center}
  .bcard:active{transform:scale(.97)}
  .bcard .bic{font-size:25px;line-height:1}
  .bcard .bnm{font-size:12.5px;font-weight:700;color:var(--txt);line-height:1.15}
  .bcard .bcount{font-size:10.5px;color:var(--muted2);font-weight:600}
  .bcard.probar{border-color:var(--warn);background:linear-gradient(160deg,var(--card),#241f15)}
  .bcard.probar .bnm{color:var(--warn)}
  /* cuadrícula de recetas dentro de un bloque */
  .rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
  .rgrid .rcard{flex:none;width:auto}
  .rgrid .rcard .thumb{height:auto;aspect-ratio:1/1;font-size:28px}
  .rcard .thumb{position:relative;overflow:hidden}
  .rcard .thumb .emo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .rcard .thumb .rimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
  .rcard .thumb .catdot{z-index:2}
  .rgrid .rcard .body{padding:5px 6px 7px}
  .rgrid .rcard .body h3{font-size:11px;line-height:1.2;min-height:26px;margin-bottom:0}
  .rcard .body .cgrp{font-size:9.5px;color:var(--muted2);font-weight:700;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .thumb.cbg-pescado{background:linear-gradient(150deg,#2b4a63,#1b2f3f)}
  .thumb.cbg-vegano{background:linear-gradient(150deg,#2f5740,#1c3327)}
  .thumb.cbg-vegetariano{background:linear-gradient(150deg,#5c5326,#33301a)}
  .thumb.cbg-carne{background:linear-gradient(150deg,#5e342e,#37211d)}
  .rcard .catdot{position:absolute;top:6px;right:6px;width:9px;height:9px;border-radius:50%;box-shadow:0 0 0 2px rgba(0,0,0,.35)}

  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .c-pescado{background:var(--fish)} .c-vegano{background:var(--veg)} .c-vegetariano{background:var(--egg)} .c-carne{background:var(--meat)}
  .cat.k-pescado{color:var(--fish)} .cat.k-vegano{color:var(--veg)} .cat.k-vegetariano{color:var(--egg)} .cat.k-carne{color:var(--meat)}

  /* planning */
  .weeknav{display:flex;align-items:center;gap:10px;margin-bottom:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-s);padding:8px 10px}
  .weeknav button{background:var(--card2);width:38px;height:38px;border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center}
  .weeknav .lbl{flex:1;text-align:center;font-weight:600;font-size:14px}
  .daycard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 13px;margin-bottom:12px}
  .daycard.today{border-color:var(--acc-d)}
  .daycard .dname{font-size:14px;font-weight:700;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
  .daycard .dname .dnum{color:var(--muted2);font-weight:500;font-size:12px}
  .slot{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid var(--line)}
  .slot .lbl{font-size:11px;color:var(--muted2);width:64px;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .slot .pick{flex:1;min-width:0;background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;text-align:left;font-size:13.5px;color:var(--txt);display:flex;align-items:center;gap:7px;overflow:hidden}
  .slot .pick.empty{color:var(--muted2);border-style:dashed}
  .slot .pick .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .slot .diners{flex-shrink:0;background:var(--card2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:8px 6px;width:52px;text-align:center;font-size:13px}
  /* semana horizontal */
  .week{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 10px;scroll-snap-type:x proximity}
  .dayrow{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:11px 13px;margin-bottom:11px}
  .dayrow.today{border-color:var(--acc-d);background:linear-gradient(180deg,#1a261e,var(--card))}
  .dayrow .drh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .dayrow .drh b{font-size:15px}
  .dayrow .drh .dn{color:var(--muted2);font-size:12px;font-weight:600}
  .meals2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .daycol{flex:0 0 145px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:11px 11px 12px;scroll-snap-align:start}
  .daycol.today{border-color:var(--acc-d);background:linear-gradient(180deg,#1a261e,var(--card))}
  .daycol .dh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .daycol .dh b{font-size:14px}
  .daycol .dh .dn{color:var(--muted2);font-size:11px;font-weight:600}
  .mslot{margin-bottom:10px}
  .mslot:last-child{margin-bottom:0}
  .mslot .ml{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:5px}
  .mslot .pick{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:9px;text-align:left;font-size:12.5px;color:var(--txt);display:flex;gap:6px;align-items:flex-start;min-height:54px}
  .mslot .pick.empty{color:var(--muted2);border-style:dashed;align-items:center}
  .mslot .pick .nm{line-height:1.25;word-break:break-word}
  .mslot .pick .pgrp{display:block;font-size:9.5px;color:var(--muted2);font-weight:700;margin-top:3px}
  .mslot .pick .dot{margin-top:3px;flex-shrink:0}
  .mslot .diners{width:100%;margin-top:5px;background:var(--card2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:6px;text-align:center;font-size:12px}
  /* chupito de la semana */
  .shot{background:linear-gradient(135deg,#2a2350,#1d2742);border:1px solid #3a3f6b;border-radius:var(--radius);padding:14px 15px;margin-bottom:16px;display:flex;align-items:center;gap:13px}
  .shot:active{transform:scale(.99)}
  .shot .se{font-size:32px;flex-shrink:0}
  .shot .st{flex:1;min-width:0}
  .shot .st .k{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#9fa8e0;font-weight:700}
  .shot .st b{font-size:15px;display:block;line-height:1.25;margin:2px 0}
  .shot .st small{color:var(--muted);font-size:12.5px}
  .shot .ar{color:#9fa8e0;font-size:22px}
  .shot-badge{display:inline-block;background:rgba(255,255,255,.12);color:#cdd2f5;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:5px}
  .drink{display:flex;align-items:center;gap:12px;padding:13px;background:var(--card);border:1px solid var(--line);border-radius:13px;margin-bottom:9px}
  .drink:active{transform:scale(.99)}
  .drink.sel{border-color:var(--acc);background:linear-gradient(135deg,#16241c,var(--card))}
  .drink .de{font-size:25px;flex-shrink:0}
  .drink .dt{flex:1;min-width:0}
  .drink .dt b{font-size:14.5px;display:block;margin-bottom:3px}
  .badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--card2);color:var(--muted);margin-right:5px}
  .badge.para{background:rgba(70,199,135,.16);color:var(--acc)}
  .badge.warn{background:rgba(230,180,80,.18);color:var(--warn)}
  .avisobox{background:rgba(230,180,80,.1);border:1px solid rgba(230,180,80,.4);border-radius:11px;padding:11px 13px;font-size:13px;color:#e6c98a;line-height:1.5;margin:12px 0}
  .safety{background:rgba(230,180,80,.08);border:1px solid rgba(230,180,80,.3);border-radius:13px;padding:13px 15px;font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:16px}
  .safety b{color:var(--warn)}

  /* shopping */
  .sec{margin-bottom:18px}
  .sec h3{font-size:13px;color:var(--acc);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;display:flex;align-items:center;gap:7px}
  .item{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:11px;margin-bottom:7px}
  .item.done{opacity:.45}
  .item.done .nm{text-decoration:line-through}
  .item .chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--muted2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
  .item.done .chk{background:var(--acc);border-color:var(--acc);color:#06150d}
  .item .nm{flex:1;font-size:14.5px}
  .item .qty{color:var(--muted);font-size:13px;font-weight:600}
  .item .del{color:var(--muted2);font-size:18px;padding:0 4px}
  .addrow{display:flex;gap:8px;margin-bottom:16px}
  .addrow input{flex:1;background:var(--card);border:1px solid var(--line);color:var(--txt);padding:11px 12px;border-radius:11px;min-width:0}

  /* salud */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .panel h3{font-size:15px;margin-bottom:13px}
  .bar{margin-bottom:11px}
  .bar .blab{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:var(--muted)}
  .bar .track{height:9px;background:var(--card2);border-radius:6px;overflow:hidden}
  .bar .fill{height:100%;border-radius:6px;transition:width .4s}
  .tip{display:flex;gap:11px;padding:11px 0;border-top:1px solid var(--line);font-size:13.5px;color:var(--muted);line-height:1.5}
  .tip:first-of-type{border-top:none}
  .tip .ic{font-size:17px;flex-shrink:0}
  .score{font-size:42px;font-weight:800;text-align:center;line-height:1}
  .score-lbl{text-align:center;color:var(--muted);font-size:13px;margin-top:4px}

  /* bottom nav */
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(20,26,22,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
  .nav button{flex:1;background:none;padding:9px 0 11px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted2);font-size:9.5px;font-weight:600}
  .nav button.active{color:var(--acc)}
  .nav button .ic{font-size:19px}

  /* modal */
  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.6)}
  .modal.open{display:flex}
  .sheet{background:var(--bg2);width:100%;max-width:760px;max-height:94vh;overflow-y:auto;border-radius:22px 22px 0 0;border:1px solid var(--line);border-bottom:none;animation:up .25s ease}
  @keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:translateY(0);opacity:1}}
  .sheet-head{position:sticky;top:0;background:var(--bg2);padding:calc(14px + env(safe-area-inset-top)) 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);z-index:2}
  .sheet-head h2{font-size:18px;flex:1}
  .sheet-head .x{background:var(--card2);width:34px;height:34px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center}
  .sheet-body{padding:16px 18px 30px}
  label.f{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px;font-weight:600}
  .field{width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);padding:11px 12px;border-radius:11px}
  textarea.field{min-height:90px;resize:vertical;line-height:1.5}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--card);border:1px solid var(--line);padding:8px 13px;border-radius:20px;font-size:13.5px;color:var(--muted);font-weight:600}
  .chip.on{background:var(--acc);color:#06150d;border-color:var(--acc)}
  .chip.probar.on{background:var(--warn);border-color:var(--warn)}
  .ing-row{display:flex;gap:6px;margin-bottom:7px}
  .ing-row input{background:var(--card);border:1px solid var(--line);color:var(--txt);padding:9px;border-radius:9px;min-width:0}
  .ing-row{align-items:center} .ing-row .nm{flex:1;min-width:0} .ing-row .q{width:52px} .ing-row .u{width:50px}
  .ing-row .sec{width:100%}
  .ing-row .rm{background:var(--card2);width:36px;border-radius:9px;color:var(--danger);flex-shrink:0}
  .ing-block{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px;margin-bottom:8px}
  .ing-block select{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--muted);padding:6px 8px;border-radius:8px;margin-top:6px;font-size:13px}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:4px}
  .seg button{flex:1;padding:10px;background:none;color:var(--muted);font-weight:600;font-size:14px}
  .seg button.on{background:var(--acc);color:#06150d}

  /* recipe detail */
  .det-hero{height:200px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:64px}
  .det-hero .emo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .det-hero .rimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
  .det-meta{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
  .pill{background:var(--card);border:1px solid var(--line);padding:6px 12px;border-radius:20px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .det-sec-t{font-size:15px;font-weight:700;margin:20px 0 10px;color:var(--acc)}
  .det-ing{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14.5px}
  .det-ing .q{color:var(--muted);font-weight:600}
  .det-serv{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:5px 8px;font-size:13px;font-weight:600}
  .cookstep{font-size:22px;line-height:1.5;padding:26px 10px;font-weight:500}
  .det-step{display:flex;gap:12px;margin-bottom:13px}
  .det-step .n{width:25px;height:25px;border-radius:50%;background:var(--acc);color:#06150d;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .det-step .t{font-size:14.5px;line-height:1.5;padding-top:1px}
  .note-box{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px;font-size:14px;color:var(--muted);line-height:1.55;white-space:pre-wrap}
  a.src{color:var(--fish);font-size:13.5px;word-break:break-all}
  .toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:var(--acc);color:#06150d;padding:11px 20px;border-radius:30px;font-weight:700;font-size:14px;z-index:200;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .hint{font-size:12.5px;color:var(--muted2);line-height:1.5;margin-top:6px}
  .lnk{display:flex;align-items:center;gap:11px;padding:12px 13px;background:var(--card);border:1px solid var(--line);border-radius:11px;margin-bottom:8px;text-decoration:none;color:var(--txt)}
  .lnk:active{transform:scale(.99)}
  .lnk .li{font-size:20px;flex-shrink:0}
  .lnk .lt{flex:1;min-width:0}
  .lnk .lt b{font-size:14.5px;font-weight:700;display:block}
  .lnk .lt small{color:var(--muted2);font-size:12px;line-height:1.35;display:block}
  .lnk .ar{color:var(--acc);font-size:20px;flex-shrink:0}

Hhlc2hpcjBkeA==", "notes": "Pasta con salsa calabacin, albahaca y parmesano Recetas de Willy Pascual en Instagram: \"PASTA CON SALSA DE CALABACÍN, ALBAHACA Y PARMESANO 🥒🌿🧀 ⠀ Si te gusta la pasta, no puedes perderte esta receta de pasta rigatoni con una salsa deliciosa de calabacín salteado con albahaca y queso parmesano y un toque crujiente de almendras. Una textura muy parecida al tradicional pesto, pero más suave y ligera. ¿Te animas a preparar esta receta de pasta conmigo? ⠀ Ingredientes para 4 personas: 🥒 2 calabacines 🌿 Albahaca fresca al gusto. 🧀 50 gramos de queso parmesano rallado. 🧄 1 diente de ajo. 🌾 400 gramos de pasta al gusto. 🥜 1 puñado de almendras tostadas. 🧂 Sal y pimienta negra al gusto. 🫒 Aceite de oliva virgen extra. ⠀ Receta paso a paso: 1. Ponemos agua a hervir, cocemos el tiempo indicado, colamos y reservamos. 2. Ahora lavamos y cortamos el calabacín finamente y lo añadimos a una sartén caliente y con aceite junto al ajo rallado, sal y pimienta negra al gusto. Dejamos cocinar a fuego medio hasta que tengamos el calabacín bien dorado y pochado. 3. Ahora ponemos el calabacín en un vaso junto a la albahaca, el queso parmesano, las almendras, un buen chorro de aceite de oliva y trituramos súper bien (puedes triturar más o menos dependiendo si te gusta notar trozos pequeños o no). 4. Ponemos la pasta ya cocida en un bol, añadimos la salsa, removemos y listo, ¡a disfrutar! ⠀ ¿Te ha gustado esta receta de pasta con salsa de calabacín? Si te ha gustado esta receta fácil y saludable, dímelo en los comentarios ❤️ ⠀ #pasta #pastaitaliana #calabacin #receta #recetas #recetafacil #recetasfaciles\"", "ingredients": [{"name": "2 calabacines", "qty": 0, "unit": "", "section": "Otros"}, {"name": "Albahaca fresca al gusto", "qty": 0, "unit": "", "section": "Otros"}, {"name": "50 gramos de queso parmesano rallado", "qty": 0, "unit": "", "section": "Otros"}, {"name": "1 diente de ajo", "qty": 0, "unit": "", "section": "Otros"}, {"name": "400 gramos de pasta al gusto", "qty": 0, "unit": "", "section": "Otros"}, {"name": "1 puñado de almendras tostadas", "qty": 0, "unit": "", "section": "Otros"}, {"name": "Sal y pimienta negra al gusto", "qty": 0, "unit": "", "section": "Otros"}, {"name": "Aceite de oliva virgen extra", "qty": 0, "unit": "", "section": "Otros"}], "steps": [], "tested": true}, {"id": "n66", "title": "Pasta con Salsa de Calabacín", "emoji": "🍝", "photo": "", "cat": "vegetariano", "blockIds": ["probar"], "baseServings": 2, "time": 30, "difficulty": "Media", "sourceUrl": "https://www.instagram.com/reel/DOTiatgCFtr/?igsh=MTVmMWFkeWxob2wyYw==", "notes": "Pasta con salsa calabacin queso crema y nuez Food and Glory | RECETAS en Instagram: \"PASTA CON SALSA DE CALABACÍN ❤️ Apóyanos con tu like para no perderte ninguna de nuestras recetas 🥰🙏 ⬇️⬇️⬇️⁣ ⁣ 🛒 Ingredientes (2 personas):⁣ ⁣ 🔸 160 g de pasta (yo he usado rigatoni)⁣ 🔹 500 g de calabacín⁣ 🔸 1 cucharada colmada de queso crema (65 g aprox. )⁣ 🔹 Ralladura de ¼ de limón⁣ 🔸 Un poco de queso de cabra desmenuzado⁣ 🔹 Un puñado de nueces 🔸 AOVE @olivar_de_plata 🔹 Pimienta⁣ 🔸 Sal⁣ ⁣ ⁣ 🍳Pasos:⁣ ⁣ 1️⃣ Lava y seca el #calabacín . Córtalo en rodajas en forma de media luna. Pon un poco de aceite de oliva en una sartén grande, caliéntalo y añade el calabacín junto con un poco de sal y pimienta molida al gusto. Rehógalo a fuego medio hasta que esté dorado. Reserva.⁣ 2️⃣ Pon a calentar una olla con abundante agua (recuerda que tienes que poner 1 litro de agua por cada 100 g de pasta). Cuando empiece a hervir, echa la pasta y un puñadito de sal gruesa. Cocínala, a fuego medio, hasta un minuto menos de lo indicado por el fabricante.⁣ 3️⃣ Mientras se cuece, pon en el vaso de la batidora la mitad del calabacín, el queso crema y un cucharón del agua de cocción. Tritura hasta obtener una salsa fina. Viértela en la sartén junto con la ralladura de ¼ de limón. ⁣ 4️⃣ Vierte la pasta escurrida encima y mézclala a fuego medio-bajo, hasta que esté toda impregnada. Si ves que queda muy espesa, puedes añadir otro poco del agua de cocción.⁣ 5️⃣ Sírvela con queso de cabra desmenuzado por encima, un extra de pimienta y unas nueces troceadas para darle una textura crujiente.⁣ ⁣ 👌 Notas: puedes sustituir la ralladura de limón por menta seca o fresca y también por albahaca. Los toppings (el queso de cabra y las nueces) son opcionales, queda también rica sencilla, aunque le dan un plus.⁣ ⁣ ⁣ 💫✅Usa nuestro código GLORY en Olivar de Plata para tener un 5 % de descuento en su AOVE de máxima calidad (no afiliado).⁣ ⁣ ⁣ Si te ha gustado la receta, guárdala para tenerla siempre a mano 👉💾. ⁣ #pasta #salsadecalabacín #comidaitaliana #foodandglory\"", "ingredients": [{"name": "(2 personas):⁣ ⁣", "qty": 0, "unit": "", "section": "Otros"}, {"name": "160 g de pasta (yo he usado rigatoni)⁣", "qty": 0, "unit": "", "section": "Otros"}, {"name": "500 g de calabacín⁣", "qty": 0, "unit": "", "section": "Otros"}, {"name": "1 cucharada colmada de queso crema (65 g aprox. )⁣", "qty": 0, "unit": "", "section": "Otros"}, {"name": "Ralladura de ¼ de limón⁣", "qty": 0, "unit": "", "section": "Otros"}, {"name": "Un poco de queso de cabra desmenuzado⁣", "qty": 0, "unit": "", "section": "Otros"}, {"name": "Un puñado de nueces", "qty": 0, "unit": "", "section": "Otros"}, {"name": "AOVE @olivar_de_plata", "qty": 0, "unit": "", "section": "Otros"}, {"name": "Pimienta⁣", "qty": 0, "unit": "", "section": "Otros"}, {"name": "Sal⁣ ⁣ ⁣", "qty": 0, "unit": "", "section": "Otros"}], "steps": [], "tested": false}, {"id": "n67", "title": "Champiñones rellenos de espinacas y mascarpone", "emoji": "🍳", "photo": "", "cat": "vegetariano", "blockIds": ["probar"], "baseServings": 4, "time": 30, "difficulty": "Media", "sourceUrl": "https://www.myrealfood.app/es/recipe/Rfo4uCtG9QjXYpbJAarJ", "notes": "", "ingredients": [], "steps": [], "tested": false}, {"id": "n68", "title": "Sopa de Cebolla", "emoji": "🍲", "photo": "", "cat": "vegetariano", "blockIds": ["probar"], "baseServings": 4, "time": 30, "difficulty" o quieras, yo le puse aceite en spray, ajo en polvo y pimentón, mezcla bien y cocina 5 min a máxima potencia, removiendo a la mitad, sirve por encima y listo! 📋Si quieres variar de verdura el brócoli funciona muy bien, y también el pack choi, otras proteínas que puedes añadir son el tempeh o los texturizados. Para hacerlo sin más rápido, puedes cocer los fideos con brócoli, apartar 100 ml de su agua de cocción y mezclar con una cucharada sopera de crema de cacahuete, un chorrito de salsa de soja, 1/2 cucharadita de ajo en polvo y otra 1/2 de aceite picante, escurre los fideos, añade la salsa y acompaña con una prote que tengas en casa. Prometo que te va a encantar! #fideos #noodles #sopa #tofu #recetasveganas\"", "ingredients": [], "steps": [], "tested": true}, {"id": "n72", "title": "Crema de Coliflor con Zanahoria", "emoji": "🍲", "photo": "", "cat": "vegano", "blockIds": ["probar"], "baseServings": 4, "time": 30, "difficulty": "Media", "sourceUrl": "https://dieta.thermomagazine.net/blog/crema-de-coliflor-con-zanahoria", "notes": "", "ingredients": [], "steps": [], "tested": false}, {"id": "n73", "title": "Pure de patata", "emoji": "🍳", "photo": "", "cat": "vegetariano", "blockIds": ["carbo"], "baseServings": 4, "time": 30, "difficulty": "Media", "sourceUrl": "https://www.instagram.com/reel/DVttJsniDI7/?igsh=MWZvaGZ1OGZ2ZjVqaA==", "notes": "", "ingredients": [], "steps": [], "tested": true}, {"id": "n74", "title": "Bacalao a la mostaza", "emoji": "🐟", "photo": "", "cat": "pescado", "blockIds": ["probar"], "baseServings": 4, "time": 30, "difficulty": "Media", "sourceUrl": "https://www.instagram.com/reel/DWyfSrqjC4T/?igsh=MWowNjk2eHo3eHJrMA==", "notes": "Marc ballo en Instagram: \"bacalao a la mostaza Es una receta muy facil, que tendrás lista en 12´ sin complicaciones para cuidarte esta Semana Santa. Dale like ❤️ guarda esta receta Ingredientes: 2 lomos de bacalao 1/2 calabacín 1/2 zanahoria 1/2 patata perejil fresco Salsa mostaza : 1 cda mostaza dijon, 1 cda mostaz  impregnades. 4.- Cap al forn, 30 minuts a 180 °C. 5.- A mitja cocció, treu la safata, remena-les i afegeix 100 g de bacon. 6.- Torna-les a enfornar fins que quedin tendres per dins i daurades per fora. Espero que, com jo, les gaudeixis. I si no… demà més i millor🫂\"", "ingredients": [], "steps": [], "tested": false}, {"id": "n83", "title": "Pestocoli (pesto de brócoli)", "emoji": "🥗", "photo": "", "cat": "vegano", "blockIds": ["veggie"], "baseServings": 4, "time": 30, "difficulty": "Media", "sourceUrl": "https://www.myrealfood.app/es/recipe/bM3ZJj66aq4KBijjbMeJ", "notes": "", "ingredients": [], "steps": [], "tested": true}, {"id": "n84", "title": "Curry de langostinos con basmati", "emoji": "🐟", "photo": "", "cat": "pescado", "blockIds": ["pescado"], "baseServings": 4, "time": 30, "difficulty": "Media", "sourceUrl": "https://www.velocidadcuchara.com/curry-de-langostinos-con-basmati/", "notes": "", "ingredients": [], "steps": [], "tested": true}, {"id": "n85", "title": "Slow Cooker Beef Brisket Pasta", "emoji": "🍝", "photo": "", "cat": "carne", "blockIds": ["prote"], "baseServings": 4, "time": 30, "difficulty": "Media", "sourceUrl": "https://www.instagram.com/reel/DYl1QMNBgeL/", "notes": "Sarah Pound en Instagram: \"SLOW COOKER BEEF BRISKET PASTA 🍝 ✨ Serves: 4 Cook Time: 8 hours on low or 4 hours on high Ingredients 1.2 kg beef brisket ½ tsp salt 1 tsp black pepper 2 tbsp extra virgin olive oil 1 brown onion, finely chopped 3 garlic cloves, chopped 400g tin diced tomatoes 3 tablespoons tomato paste ⅓ cup red wine 1 cup beef stock 1 tablespoon dried Italian herbs 350g pasta (any kind you like) To serve: Grated Parmesan cheese Fresh parsley Method: 1. Pat the beef brisket dry and season with salt and pepper. Heat olive oil in a frying pan over medium-high heat. Sear the brisket on all sides until well browned. 2. Transfer the seared brisket to your slow cooker. Add onion, garlic, tinned tomatoes, tomato paste, red wine, beef stock, and dried Italian herbs. 3. Cover and cook on low for 8 hours or high for 4 hours, until the brisket is fall-apart tender. 4. Remove the brisket, shred it using two forks, then return it to the sauce in the slow cooker. Stir well to combine. 5. Meanwhile, cook your pasta separately according to packet instructions. Drain and add it to the slow cooker. Stir through the brisket sauce until well coated. 6. Dish it up with a generous sprinkle of grated Parmesan and fresh parsley. Season to taste. #slowcook #slowcooker #slowcookermeals #slowcookerrecipes #slowcooking\"", "ingredients": [], "steps": [], "tested": true}, {"id": "n86", "title": "Caldo Gallego", "emoji": "🍲", "photo": "", "cat": "carne", "blockIds": ["prote"], "baseServings": 4, "time": 30, "difficulty": "Media", "sourceUrl": "https://www.instagram.com/reel/DHEiZ4fOwEL/", "notes": "Recetas fáciles l Trucos de chefs l Consejos viajar sola en Instagram: \"🍲CALDO GALLEGO🍲 Hay diferentes recetas de caldo gallego, todas son válidas, ninguna está por encima de otra, las abuelas eran las que mejores caldos hacían y usaban lo que tenían en casa Abuela —— INGREDIENTES PARA 5-6 PERSONAS 👩🏼‍🍳2 manojos de grelos cortados en trocitos y sin tallos 👩🏼‍🍳600 g de alubias en remojo del día anterior 👩🏼‍🍳2 patatas medianas peladas y chascadas 👩🏼‍🍳1 hueso de espinazo salado 👩🏼‍🍳1 trozo de jamón de 300 gr 👩🏼‍🍳600 gr de lacón 👩🏼‍🍳20 gr de unto 👩🏼‍🍳3 chorizos 👩🏼‍🍳175 gr de panceta 👩🏼‍🍳Agua hasta cubrir 2 dedos por encima de las alubias —— ELABORACIÓN 1- Remojar en agua abundante, las alubias desde la noche anterior 2- Cortar las carnes más grandes y desalar las que sean saladas. 3- En una olla, añadir las alubias, el agua 2 dedos por arriba y todas las carnes, llevar a ebullición y desespumar. Ojo, retirar el unto pasada una hora. 4- En total deben cocer a fuego bajo una hora y media aprox, depende de las alubias. 5-Cuando queden 15 minutos añadir las patatas y cocinar hasta que estén tiernas. 6-Cuando queden 10 minutos añadir los grelos y cocinar hasta que estén tiernos. 7- Comprobar el punto de sal por si hubiera que corregirlo. 8- Dejar reposar la olla, tapada durante 15 minutos. —— TRUCOS 👉🏻Los grelos se introducen en el caldo a movimientos para no romper las alubias. 👉🏻Las carnes se deben servir troceadas en una fuente, aparte o bien dentro del caldo. 👉🏻Uno de los ingredientes más importante es el “unto”, es decir grasa de cerdo salada, enrollada sobre si misma  y que se utiliza, como decía mi abuela, para dar “sustancia”. 👉🏻El caldo gallego, como casi todos los platos de cuchara, gana sabor y textura al día siguiente. —— Un poquito de amor y listo ❤️\"", "ingredients": [], "steps": [], "tested": true}, {"id": "n87", "title": "Pizza en airfryer", "emoji": "🍳", "photo": "", "cat": "vegetariano", "blockIds": ["veggie"], "baseServings": 4, "time": 30, "difficulty": "Media", "sourceUrl": "https://www.instagram.com/reel/DZVTTaFtR7R/", "notes": "Marc Pizza 🍕 en Instagram: \"Receta en airfrayer . . . #pizza #pizzatime #pizzalover #receta #cocina\"", "ingredients": [], "steps": [], "tested": true}], "planning": {}, "extras": [], "shopState": {}};

  document.getElementById('v-'+v).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active', b.dataset.v===v));

  if(v==='compra') renderShopping();

}

function getBlock(id){ return db.blocks.find(b=>b.id===id); }
let currentBlock = null;   // null = rejilla de bloques; id = dentro de un bloque

function ytThumb(u){ const m=u&&u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/); return m?`https://i.ytimg.com/vi/${m[1]}/hqdefault.jpg`:''; }
function imgKeyword(r){
  const t=(r.title||'').toLowerCase();
  const map=[['pizza','pizza'],['lasaña','lasagna'],['pasta','pasta'],['fideo','noodles'],['noodle','noodles'],['ramen','ramen'],['ñoqui','gnocchi'],['curry','curry'],['gazpacho','gazpacho'],['sopa','soup'],['crema','soup'],['caldo','soup'],['potaje','stew'],['guiso','stew'],['estofado','stew'],['ensalada','salad'],['poke','salmon'],['arroz','rice'],['risotto','risotto'],['paella','paella'],['couscous','couscous'],['cuscús','couscous'],['hummus','hummus'],['tortilla','omelette'],['huevo','eggs'],['salm','salmon'],['atún','tuna'],['atun','tuna'],['merluza','fish'],['bacalao','fish'],['pescado','fish'],['pulpo','octopus'],['gamba','shrimp'],['langostino','shrimp'],['marisco','seafood'],['pollo','chicken'],['pavo','turkey'],['ternera','beef'],['cerdo','pork'],['taco','tacos'],['quesadilla','quesadilla'],['burger','burger'],['hamburguesa','burger'],['lenteja','lentils'],['garbanzo','chickpeas'],['alubia','beans'],['fave','beans'],['judias','beans'],['judías','beans'],['tofu','tofu'],['quinoa','quinoa'],['brócoli','broccoli'],['brocoli','broccoli'],['coliflor','cauliflower'],['calabaza','pumpkin'],['calabacín','zucchini'],['calabacin','zucchini'],['berenjena','eggplant'],['espinaca','spinach'],['boniato','potato'],['patata','potato'],['pure','puree'],['puré','puree'],['remolacha','beetroot'],['pad thai','noodles'],['bulgogi','korean'],['katsu','katsu'],['pesto','pasta'],['champi','mushrooms'],['carne','meat'],['trinxat','potato'],['migas','bread']];
  for(const kv of map){ if(t.includes(kv[0])) return kv[1]; }
  return {pescado:'fish',carne:'meat',vegano:'vegetables',vegetariano:'food'}[r.cat]||'food';
}
function imgFor(r){
  if(r.photo) return r.photo;
  const yt=ytThumb(r.sourceUrl); if(yt) return yt;
  let s=7; const id=r.id||'x'; for(let i=0;i<id.length;i++){ s=(s*31+id.charCodeAt(i))>>>0; }
  return 'https://loremflickr.com/320/320/'+imgKeyword(r)+',food?lock='+(s%900+1);
}
function catKw(r){ return ({pescado:'fish',carne:'meat',vegano:'vegetables',vegetariano:'food'})[r.cat]||'food'; }
function imgTag(r,cls){
  if(r.photo) return `<img class="${cls}" src="${r.photo}" alt="" onerror="this.remove()">`;
  const yt=ytThumb(r.sourceUrl);
  let s=7; const id=r.id||'x'; for(let i=0;i<id.length;i++) s=(s*31+id.charCodeAt(i))>>>0;
  const lock=s%900+1;
  const primary = yt || ('https://loremflickr.com/320/320/'+imgKeyword(r)+'?lock='+lock);
  const q = encodeURIComponent((r.title||'comida')+' plato de comida casera');
  return `<img class="${cls}" loading="lazy" src="${primary}" data-s="0" data-kw="${catKw(r)}" data-lock="${lock}" data-q="${q}" alt="" onerror="imgFallback(this)">`;
}
function imgFallback(el){
  const s=(+el.dataset.s||0)+1; el.dataset.s=s;
  if(s===1) el.src='https://loremflickr.com/320/320/'+el.dataset.kw+'?lock='+el.dataset.lock;
  else if(s===2) el.src='https://image.pollinations.ai/prompt/'+el.dataset.q+'?width=320&height=320&nologo=true';
  else el.remove();
}
function cardHtml(r, onclick){
  const oc = onclick || `openRecipe('${r.id}')`;
  const bl = getBlock((r.blockIds||[])[0]);
  return `<div class="rcard" onclick="${oc}">
    <div class="thumb cbg-${r.cat}"><span class="emo">${r.emoji||'🍲'}</span>${imgTag(r,'rimg')}<span class="catdot c-${r.cat}"></span></div>
    <div class="body"><h3>${esc(r.title)}</h3>${bl?`<div class="cgrp">${bl.icon||'📁'} ${esc(bl.name)}</div>`:''}</div></div>`;
}

function renderRecipes(){
  const q = (document.getElementById('recipeSearch').value||'').toLowerCase();
  const wrap = document.getElementById('recipeBlocks');

  // 1) BÚSQUEDA: lista plana de resultados de todos los bloques
  if(q){
    const list = db.recipes.filter(r=>r.title.toLowerCase().includes(q) || (r.ingredients||[]).some(i=>(i.name||'').toLowerCase().includes(q))); list.sort((a,b)=>a.title.localeCompare(b.title,'es'));
    wrap.innerHTML = `<div class="view-title">${list.length} resultado${list.length!==1?'s':''}</div>`+
      (list.length?`<div class="rgrid">${list.map(r=>cardHtml(r)).join('')}</div>`:`<div class="empty">Nada coincide con “${esc(q)}”.</div>`);
    return;
  }

  // 2) DENTRO DE UN BLOQUE: cabecera con volver + recetas del bloque
  if(currentBlock){
    const bl = getBlock(currentBlock);
    if(!bl){ currentBlock=null; return renderRecipes(); }
    const list = db.recipes.filter(r=>r.blockIds.includes(bl.id)); list.sort((a,b)=>a.title.localeCompare(b.title,'es'));
    wrap.innerHTML = `
      <button class="btn ghost sm" style="margin-bottom:14px" onclick="currentBlock=null;renderRecipes()">‹ Bloques</button>
      <div class="block-head" style="margin-bottom:14px"><h2 ${bl.id==='probar'?'style="color:var(--warn)"':''}>${bl.icon||'📁'} ${esc(bl.name)}</h2><span class="count">${list.length}</span></div>
      ${list.length?`<div class="rgrid">${list.map(r=>cardHtml(r)).join('')}</div>`
        :`<div class="empty">${bl.id==='probar'?'Aquí van las recetas nuevas hasta que las pruebes.':'Este bloque está vacío. Añade recetas o muévelas aquí desde “Por probar”.'}</div>`}`;
    return;
  }

  // 3) PANTALLA PRINCIPAL: rejilla de bloques (botones con icono)
  let html = `<div class="bgrid">`;
  db.blocks.forEach(bl=>{
    const n = db.recipes.filter(r=>r.blockIds.includes(bl.id)).length;
    html += `<button class="bcard ${bl.id==='probar'?'probar':''}" onclick="currentBlock='${bl.id}';renderRecipes()">
      <span class="bic">${bl.icon||'📁'}</span>
      <span class="bnm">${esc(bl.name)}</span>
      <span class="bcount">${n} receta${n!==1?'s':''}</span>
    </button>`;
  });
  html += `</div>`;
  wrap.innerHTML = html;
}

function openRecipe(id, serv){
  const r = db.recipes.find(x=>x.id===id); if(!r) return;
  const blocks = r.blockIds.map(getBlock).filter(Boolean).map(b=>`${b.icon} ${esc(b.name)}`).join(' · ');
  const base = r.baseServings||1; const sv = serv || base; const f = sv/base;
  let ing = r.ingredients.map(i=>{ const q = i.qty? smartRound(i.qty*f, i.unit):0; return `<div class="det-ing"><span>${esc(i.name)}</span><span class="q">${q?fmtQty(q)+' '+esc(i.unit||''):''}</span></div>`; }).join('');
  let steps = r.steps.map((s,i)=>`<div class="det-step"><div class="n">${i+1}</div><div class="t">${esc(s)}</div></div>`).join('');
  const inProbar = r.blockIds.includes('probar');
  const servSel = `<select class="det-serv" onchange="openRecipe('${r.id}',parseInt(this.value))">${[1,2,3,4,5,6,7,8,10,12].map(n=>`<option value="${n}" ${n===sv?'selected':''}>para ${n}</option>`).join('')}</select>`;
  openSheet(`
    <div class="sheet-head"><h2>${esc(r.title)}</h2><button class="x" onclick="closeModal()">✕</button></div>
    <div class="det-hero cbg-${r.cat}"><span class="emo">${r.emoji||'🍲'}</span>${imgTag(r,'rimg')}</div>
    <div class="sheet-body">
      <div class="det-meta">
        <span class="pill"><span class="dot c-${r.cat}"></span>${CATS[r.cat]||''}</span>
        <span class="pill">⏱ ${r.time||'–'} min</span>
        <span class="pill">📊 ${esc(r.difficulty||'')}</span>
      </div>
      <div class="hint">📂 ${blocks||'Sin bloque'}</div>
      <div class="det-sec-t" style="display:flex;align-items:center;justify-content:space-between">Ingredientes ${servSel}</div>
      ${ing||'<div class="hint">Sin ingredientes.</div>'}
      <div class="det-sec-t">Preparación</div>
      ${steps||'<div class="hint">Sin pasos.</div>'}
      ${r.notes?`<div class="det-sec-t">Notas</div><div class="note-box">${esc(r.notes)}</div>`:''}
      ${r.sourceUrl?`<div class="det-sec-t">Origen</div><a class="src" href="${esc(r.sourceUrl)}" target="_blank">${esc(r.sourceUrl)}</a>`:''}
      <div class="divider"></div>
      ${(!r.ingredients||!r.ingredients.length)&&r.notes&&r.notes.length>30?`<button class="btn block" onclick="extractNotes('${r.id}')">✨ Sacar ingredientes de la descripción</button><div style="height:10px"></div>`:''}
      ${r.steps&&r.steps.length?`<button class="btn ghost block" onclick="openCook('${r.id}',0)">👨‍🍳 Modo cocina</button><div style="height:10px"></div>`:''}
      <button class="btn ghost block" onclick="addToPlan('${r.id}')">📅 Añadir al planning</button>
      <div style="height:10px"></div>
      ${inProbar?`<button class="btn ghost block" onclick="promoteRecipe('${r.id}')">✅ Ya la probé — mover a un bloque</button><div style="height:10px"></div>`:''}
      <div class="row-btns" style="margin:0">
        <button class="btn ghost" onclick="openRecipeForm('${r.id}')">✏️ Editar</button>
        <button class="btn danger" onclick="deleteRecipe('${r.id}')">🗑️ Borrar</button>
      </div>
    </div>`);
}
let cookLock=null;
async function openCook(id,idx){
  const r=db.recipes.find(x=>x.id===id); if(!r) return;
  if(!r.steps||!r.steps.length){ toast('Esta receta no tiene pasos'); return; }
  idx=Math.max(0,Math.min(idx,r.steps.length-1));
  try{ if(navigator.wakeLock && !cookLock) cookLock=await navigator.wakeLock.request('screen'); }catch(e){}
  openSheet(`<div class="sheet-head"><h2>👨‍🍳 ${esc(r.title)}</h2><button class="x" onclick="closeCook('${id}')">✕</button></div>
    <div class="sheet-body" style="text-align:center">
      <div class="hint">Paso ${idx+1} de ${r.steps.length}</div>
      <div class="cookstep">${esc(r.steps[idx])}</div>
      <div class="row-btns" style="margin-top:22px">
        <button class="btn ghost" style="flex:1;${idx===0?'opacity:.35;pointer-events:none':''}" onclick="openCook('${id}',${idx-1})">‹ Anterior</button>
        ${idx<r.steps.length-1?`<button class="btn" style="flex:1" onclick="openCook('${id}',${idx+1})">Siguiente ›</button>`:`<button class="btn" style="flex:1" onclick="closeCook('${id}')">✅ Terminar</button>`}
      </div>
      <p class="hint" style="margin-top:16px">La pantalla se mantiene encendida mientras cocinas.</p>
    </div>`);
}
function closeCook(id){ if(cookLock){ try{cookLock.release();}catch(e){} cookLock=null; } openRecipe(id); }

function deleteRecipe(id){
  if(!confirm('¿Borrar esta receta?')) return;
  db.recipes = db.recipes.filter(r=>r.id!==id);
  // limpiar del planning
  Object.values(db.planning).forEach(day=>MEALS.forEach(([m])=>{ if(day[m]&&day[m].recipeId===id) delete day[m]; }));
  save(); closeModal(); renderRecipes(); toast('Receta borrada');
}

function suggestBlock(r){
  const t = (r.title+' '+(r.notes||'')+' '+(r.sourceUrl||'')).toLowerCase();
  if(/(airfryer|air fryer|air-fryer|freidora|cecotec)/.test(t)) return 'airfryer';
  if(/(thermomix|thermomagazine|recetasparathermomix|mambo|monsieur cuisine|\btmx\b)/.test(t)) return 'thermomix';
  if(/(tarta|pastel|postre|dulce|bizcocho|galleta|brownie|crep|tortita|muffin|cheesecake|flan|mousse|repost)/.test(t)) return 'repos';
  if(/(desayuno|tostada|porridge|avena|granola|yogur|smoothie)/.test(t)) return 'desayunos';
  if(r.cat==='pescado') return 'pescado';
  if(/(pasta|fideo|noodle|ramen|ñoqui|lasaña|espagueti|macarr)/.test(t)) return 'pasta';
  if(/(arroz|risotto|couscous|cuscús|wok|pad thai|patata|boniato|pure|puré|trinxat)/.test(t)) return 'carbo';
  if(/(sopa|crema|caldo|guiso|potaje|estofado|vichy|marmitako)/.test(t)) return 'cremas';
  if(/(ensalada|verdura|brócoli|coliflor|calabac|berenjena|espinaca|champi|judía|judias|escalivada|pisto|faves)/.test(t)) return 'verduras';
  if(r.cat==='carne') return 'prote';
  if(r.cat==='vegano'||r.cat==='vegetariano') return 'verduras';
  return 'prote';
}
function promoteRecipe(id){
  const r = db.recipes.find(x=>x.id===id);
  const sug = suggestBlock(r);
  const sb = getBlock(sug) || db.blocks.find(b=>b.id!=='probar');
  const others = db.blocks.filter(b=>b.id!=='probar' && b.id!==sb.id);
  openSheet(`<div class="sheet-head"><h2>Mover a un grupo</h2><button class="x" onclick="openRecipe('${id}')">✕</button></div>
    <div class="sheet-body">
      <p class="hint">Por el tipo de plato “${esc(r.title)}”, te recomiendo este grupo:</p>
      <button class="btn block" style="margin:10px 0 4px" onclick="moveToBlock('${id}','${sb.id}')">⭐ ${sb.icon} ${esc(sb.name)} · recomendado</button>
      <div class="det-sec-t">O elige otro grupo</div>
      <div class="chips">${others.map(b=>`<button class="chip" onclick="moveToBlock('${id}','${b.id}')">${b.icon} ${esc(b.name)}</button>`).join('')}</div>
    </div>`);
}
function moveToBlock(id, blockId){
  const r = db.recipes.find(x=>x.id===id);
  r.blockIds = r.blockIds.filter(b=>b!=='probar');
  if(!r.blockIds.includes(blockId)) r.blockIds.push(blockId);
  r.tested = true; save(); openRecipe(id); toast('Movida ✅');
}

    {id:null,title:'',emoji:'🍲',photo:'',cat:'vegetariano',blockIds:['probar'],baseServings:2,time:30,difficulty:'Fácil',sourceUrl:'',notes:'',ingredients:[{name:'',qty:'',unit:'',section:'Otros'}],steps:['']};
  formDraft = r;
  renderForm();
}

  const r = formDraft;
  const catChips = Object.entries(CATS).map(([k,v])=>`<button class="chip ${r.cat===k?'on':''}" onclick="formDraft.cat='${k}';renderForm()"><span class="dot c-${k}"></span> ${v}</button>`).join('');

  const ingRows = r.ingredients.map((i,idx)=>`
    <div class="ing-row">

      <button class="rm" onclick="formDraft.ingredients.splice(${idx},1);renderForm()">✕</button>
    </div>`).join('');
  openSheet(`
    <div class="sheet-head"><h2>${r.id?'Editar receta':'Nueva receta'}</h2><button class="x" onclick="closeModal()">✕</button></div>
    <div class="sheet-body">
      <div class="seg">
        <button class="on" id="tabManual" onclick="switchFormTab('manual')">✏️ Manual</button>
        <button id="tabPaste" onclick="switchFormTab('paste')">📋 Pegar texto</button>
      </div>
      <div id="pasteArea" style="display:none">
        <label class="f">Importar desde un enlace web (blog de recetas)</label>
        <div style="display:flex;gap:8px"><input class="field" id="importUrl" placeholder="https://..." style="flex:1"><button class="btn sm" onclick="importFromLink()">🌐 Traer</button></div>
        <div class="hint">Pega un enlace de blog y traigo ingredientes y pasos solos. En el ordenador (archivo local) funciona si pones tu URL de Netlify en ⚙️.</div>
        <div class="divider"></div>
        <label class="f">…o pega aquí la receta (de Instagram, web o donde sea)</label>
        <textarea class="field" id="pasteText" placeholder="Pega título, ingredientes y pasos. La app intentará separarlos."></textarea>
        <div class="hint">Truco: separa los ingredientes en líneas. Lo que parezca un ingrediente irá a ingredientes, lo demás a pasos.</div>
        <div style="height:10px"></div>
        <button class="btn block" onclick="parsePaste()">✨ Convertir en receta</button>
        <div class="hint" style="margin-top:10px">La extracción automática real de enlaces de Instagram llegará en una versión futura. Por ahora, pega el texto.</div>
      </div>
      <div id="manualArea">
        <label class="f">Título</label>
        <input class="field" id="f_title" value="${esc(r.title)}" placeholder="Nombre de la receta">
        <label class="f">Foto (opcional)</label>
        <input type="file" accept="image/*" class="field" onchange="loadPhoto(this)">
        ${r.photo?`<div class="hint">✅ Foto cargada. <a class="src" onclick="formDraft.photo='';renderForm()">Quitar</a></div>`:`<div class="hint">Si no pones foto, se usa un emoji. <input value="${esc(r.emoji)}" style="width:50px;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:4px;text-align:center" oninput="formDraft.emoji=this.value"></div>`}
        <label class="f">Tipo (para el equilibrio saludable)</label>
        <div class="chips">${catChips}</div>

        <div style="display:flex;gap:10px">
          <div style="flex:1"><label class="f">Personas base</label><input class="field" type="number" min="1" id="f_serv" value="${r.baseServings}"></div>
          <div style="flex:1"><label class="f">Tiempo (min)</label><input class="field" type="number" min="0" id="f_time" value="${r.time}"></div>
        </div>
        <label class="f">Dificultad</label>
        <select class="field" id="f_diff">${["Fácil","Media","Difícil"].map(d=>`<option ${r.difficulty===d?'selected':''}>${d}</option>`).join('')}</select>

function switchFormTab(t){
  syncFormInputs();
  document.getElementById('tabManual').classList.toggle('on', t==='manual');
  document.getElementById('tabPaste').classList.toggle('on', t==='paste');
  document.getElementById('manualArea').style.display = t==='manual'?'block':'none';
  document.getElementById('pasteArea').style.display = t==='paste'?'block':'none';
}
function toggleFormBlock(id){
  syncFormInputs();
  const i = formDraft.blockIds.indexOf(id);
  if(i>=0) formDraft.blockIds.splice(i,1); else formDraft.blockIds.push(id);
  renderForm();
}
function loadPhoto(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{ resizeImg(e.target.result, d=>{ formDraft.photo=d; renderForm(); }); };
  reader.readAsDataURL(file);
}
function resizeImg(src, cb){
  const img = new Image();
  img.onload = ()=>{ const max=720; let w=img.width,h=img.height; if(w>max){h=h*max/w;w=max;}
    const c=document.createElement('canvas'); c.width=w;c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',0.8)); };
  img.src = src;
}
function syncFormInputs(){
  const g=id=>document.getElementById(id);
  if(g('f_title')) formDraft.title=g('f_title').value;
  if(g('f_serv')) formDraft.baseServings=Math.max(1,parseInt(g('f_serv').value)||1);
  if(g('f_time')) formDraft.time=parseInt(g('f_time').value)||0;
  if(g('f_diff')) formDraft.difficulty=g('f_diff').value;
  if(g('f_src')) formDraft.sourceUrl=g('f_src').value;
  if(g('f_notes')) formDraft.notes=g('f_notes').value;
  if(g('f_steps')) formDraft.steps=g('f_steps').value.split('\n').map(s=>s.trim()).filter(Boolean);
}
function saveRecipe(){
  syncFormInputs();
  const r = formDraft;
  if(!r.title.trim()){ toast('Ponle un título'); return; }
  r.ingredients = r.ingredients.filter(i=>i.name.trim()).map(i=>({name:i.name.trim(),qty:parseFloat(String(i.qty).replace(',','.'))||0,unit:(i.unit||'').trim(),section:guessSection(i.name)}));
  if(!r.blockIds.length) r.blockIds=['probar'];
  if(r.id){ const idx=db.recipes.findIndex(x=>x.id===r.id); db.recipes[idx]=r; }
  else { r.id=uid(); db.recipes.push(r); }
  save();
  if(pendingSlot){ const ps=pendingSlot; pendingSlot=null; if(!db.planning[ps.k]) db.planning[ps.k]={}; db.planning[ps.k][ps.m]={recipeId:r.id, diners:r.baseServings}; save(); closeModal(); go('planning'); toast('Añadida al día ✅'); return; }
  closeModal(); renderRecipes(); toast('Receta guardada ✅');
}
async function importFromLink(){
  const url=(document.getElementById('importUrl').value||'').trim();
  if(!url){ toast('Pega un enlace'); return; }
  let base='';
  if(location.protocol!=='http:' && location.protocol!=='https:'){
    base=(db.netlifyUrl||'').replace(/\/+$/,'');
    if(!base){ toast('Pon tu URL de Netlify en ⚙️ para importar desde el ordenador'); return; }
  }
  toast('Trayendo de la web…');
  try{
    const res=await fetch(base+'/.netlify/functions/import?url='+encodeURIComponent(url));
    if(!res.ok) throw 0;
    const d=await res.json();
    if(!d.found){ toast('No encontré receta legible en esa página'); return; }
    if(d.title){ let t=d.title.trim(); t=t.split(/\s[-–]\s|:\s/)[0]; if(t.length>55) t=t.slice(0,55).replace(/\s\S*$/,''); formDraft.title=t; }
    if(d.image) formDraft.photo=d.image;
    if(d.ingredients&&d.ingredients.length) formDraft.ingredients=d.ingredients.map(parseIngLine);
    if(d.steps&&d.steps.length) formDraft.steps=d.steps;
    formDraft.sourceUrl=url;
    const y=parseInt(d.yield); if(y) formDraft.baseServings=y;
    switchFormTab('manual'); renderForm(); toast('¡Traído! Revisa y guarda ✅');
  }catch(e){ toast('No pude conectar con el importador. Revisa tu URL de Netlify en ⚙️ o tu conexión.'); }
}
function parseRecipeText(txt){
  txt=(txt||'').trim();
  let lines=txt.split(/\n+/).map(l=>l.trim()).filter(Boolean);
  if(lines.length<=2 && txt.length>120){
    let t=txt;
    t=t.replace(/\s*(Ingredientes|Pasos?|Preparaci[oó]n|Elaboraci[oó]n|Instrucciones|M[eé]todo)\s*:?\s*/gi,'\n$1:\n');
    t=t.replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2B00}-\u{2BFF}\u{2700}-\u{27BF}]/gu,'\n');
    t=t.replace(/\s([•·▪‣\-–])\s/g,'\n');
    t=t.replace(/\s(\d{1,2})[\).]\s/g,'\n$1. ');
    lines=t.split(/\n+/).map(l=>l.replace(/^[•·▪‣\-–]\s*/,'').trim()).filter(Boolean);
  }
  let title='';
  if(lines.length && lines[0].length<60 && !/^[\d]/.test(lines[0]) && !/ingredient/i.test(lines[0])) title=lines.shift();
  const ings=[],steps=[];
  const verbRe=/(añad|mezcl|cocin|cort|pela|pica|sofr|rehog|hornea|hierv|sirve|bate|tritur|reserv|escurr|calient|pon\b|coloca|dora|vierte|sazona|salpimienta|incorpora|deja|retira|tapa|remueve|precalienta|lleva|cuece|cuela|enfr|monta)/i;
  let mode='auto';
  lines.forEach(l=>{
    const low=l.toLowerCase();
    if(/^\s*ingredientes?\b/.test(low)){ mode='ing'; const a=l.replace(/^\s*ingredientes?[^:]*:?\s*/i,'').trim(); if(a&&a.length<60) ings.push(parseIngLine(a)); return; }
    if(/^\s*(elaboraci|preparaci|pasos?|instrucciones|m[eé]todo|c[oó]mo se hace|c[oó]mo hacer|paso a paso)/.test(low)){ mode='step'; return; }
    if(mode==='step'){ if(l.length>2) steps.push(l.replace(/^\d+[\).]\s*/,'')); return; }
    const looksStep = l.length>50 || verbRe.test(l) || /[.:]$/.test(l);
    if(mode==='ing' || !looksStep) ings.push(parseIngLine(l));
    else steps.push(l.replace(/^\d+[\).]\s*/,''));
  });
  return {title, ingredients:ings.filter(i=>i.name), steps};
}
function parsePaste(){
  const txt=(document.getElementById('pasteText').value||'').trim();
  if(!txt){ toast('Pega algo primero'); return; }
  const r=parseRecipeText(txt);
  if(r.title && !formDraft.title) formDraft.title=r.title;
  formDraft.ingredients = r.ingredients.length? r.ingredients : [{name:'',qty:'',unit:''}];
  if(r.steps.length) formDraft.steps=r.steps;
  switchFormTab('manual'); renderForm();
  toast('Hecho — revisa y ajusta 👇');
}
function extractNotes(id){
  const r=db.recipes.find(x=>x.id===id); if(!r) return;
  const src=(r.notes&&r.notes.length>20)?r.notes:r.title;
  const p=parseRecipeText(src);
  if(!p.ingredients.length && !p.steps.length){ toast('No encontré ingredientes en la descripción'); return; }
  if(p.ingredients.length) r.ingredients=p.ingredients;
  if(p.steps.length && (!r.steps||!r.steps.length)) r.steps=p.steps;
  save(); openRecipe(id); toast('Sacado de la descripción ✅ — revísalo');
}
function extractAllNotes(){
  let n=0;
  db.recipes.forEach(r=>{
    if((!r.ingredients||!r.ingredients.length) && r.notes && r.notes.length>30){
      const p=parseRecipeText(r.notes);
      if(p.ingredients.length){ r.ingredients=p.ingredients; if(p.steps.length&&(!r.steps||!r.steps.length)) r.steps=p.steps; n++; }
    }
  });
  save(); renderRecipes();
  toast(n? (n+' receta(s) rellenadas ✅'):'No había descripciones que rellenar');
}
function guessSection(name){
  const n = name.toLowerCase();
  if(/(merluza|salm|atún|pescado|gamba|almeja|marisco|bacalao|dorada|lubina|sardina)/.test(n)) return 'Pescadería';
  if(/(pollo|ternera|cerdo|carne|chuleta|lomo|jamón|pavo|salchicha|bacon)/.test(n)) return 'Carnicería';
  if(/(leche|queso|yogur|nata|mantequilla|huevo|feta)/.test(n)) return 'Lácteos y huevos';
  if(/(pan|baguette|tortilla de trigo|wrap)/.test(n)) return 'Panadería';
  if(/(congelad|guisante|edamame|helado)/.test(n)) return 'Congelados';
  if(/(agua|vino|cerveza|refresco|zumo|bebida)/.test(n)) return 'Bebidas';
  if(/(papel|jabón|detergente|limpia|pilas|bolsa|servilleta)/.test(n)) return 'Limpieza/Hogar';
  if(/(tomate|cebolla|ajo|patata|zanahoria|pimiento|espinaca|lechuga|aguacate|limón|fruta|verdura|brócoli|calabac|jengibre|perejil|cebolleta)/.test(n)) return 'Frutas y verduras';
  return 'Despensa';
}

function mondayOf(d){ d=new Date(d); const day=(d.getDay()+6)%7; d.setHours(0,0,0,0); d.setDate(d.getDate()-day); return d; }
function dkey(d){ return d.toISOString().slice(0,10); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function shiftWeek(n){ weekStart=addDays(weekStart,n*7); renderPlanning(); renderShopping(); }
function weekLabel(){
  const end=addDays(weekStart,6);
  const f=d=>d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  return `${f(weekStart)} – ${f(end)}`;
}
function planningText(){
  const out=['🍽️ Menú de la semana ('+weekLabel()+')',''];
  for(let i=0;i<7;i++){ const d=addDays(weekStart,i); const k=dkey(d); const day=db.planning[k]||{};
    out.push('*'+DAYS[i]+'* ('+d.getDate()+'/'+(d.getMonth()+1)+')');
    MEALS.forEach(([m,lbl])=>{ const s=day[m]; const r=s?(s.custom?{title:s.title}:db.recipes.find(x=>x.id===s.recipeId)):null; out.push('  • '+lbl+': '+(r?r.title:'—')); });
    out.push('');
  }
  return out.join('\n');
}
function copyPlanning(){ const t=planningText(); if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(()=>toast('Menú copiado ✅'),()=>window.prompt('Copia el menú:',t)); } else { window.prompt('Copia el menú:',t); } }
function sharePlanningWA(){ window.open('https://wa.me/?text='+encodeURIComponent(planningText()),'_blank'); }
function fillWeek(){
  const slots=[]; const counts={pescado:0,vegano:0,vegetariano:0,carne:0}; let total=0; const used=new Set();
  for(let i=0;i<7;i++){ const k=dkey(addDays(weekStart,i));
    MEALS.forEach(([m])=>{ const s=(db.planning[k]||{})[m];
      if(s){ const r=!s.custom&&db.recipes.find(x=>x.id===s.recipeId); if(r){ counts[r.cat]=(counts[r.cat]||0)+1; total++; used.add(r.id); } }
      else slots.push({k,m});
    });
  }
  if(!slots.length){ toast('La semana ya está completa'); return; }
  const pool=db.recipes.filter(r=>(r.ingredients&&r.ingredients.length) || !r.blockIds.includes('probar'));
  const base=pool.length?pool:db.recipes.slice();
  if(!base.length){ toast('No tienes recetas para rellenar'); return; }
  if(!confirm('Voy a rellenar '+slots.length+' hueco(s) vacío(s) con tus recetas buscando equilibrio (pescado, verdura/legumbre, carne puntual). ¿Sigo?')) return;
  const finalTotal=total+slots.length;
  const targets={pescado:Math.round(finalTotal*0.30), vegano:Math.round(finalTotal*0.30), vegetariano:Math.round(finalTotal*0.25), carne:Math.max(1,Math.round(finalTotal*0.15))};
  function pick(){
    const order=['pescado','vegano','vegetariano','carne'].sort((a,b)=>(counts[a]-targets[a])-(counts[b]-targets[b]));
    for(const cat of order){ const c=base.filter(r=>r.cat===cat && !used.has(r.id)); if(c.length) return c[Math.floor(Math.random()*c.length)]; }
    const any=base.filter(r=>!used.has(r.id)); if(any.length) return any[Math.floor(Math.random()*any.length)];
    return base[Math.floor(Math.random()*base.length)];
  }
  slots.forEach(({k,m})=>{ const r=pick(); if(!r) return; if(!db.planning[k])db.planning[k]={}; db.planning[k][m]={recipeId:r.id,diners:2}; counts[r.cat]=(counts[r.cat]||0)+1; used.add(r.id); });
  save(); renderPlanning(); toast('Semana rellenada ✨');
}
function copyPrevWeek(){
  let any=false, hasNow=false;
  for(let i=0;i<7;i++){ if(db.planning[dkey(addDays(weekStart,i))]) hasNow=true; if(db.planning[dkey(addDays(weekStart,i-7))]) any=true; }
  if(!any){ toast('La semana anterior está vacía'); return; }
  if(hasNow && !confirm('Esto sobrescribirá lo que tengas planificado esta semana con la anterior. ¿Continuar?')) return;
  for(let i=0;i<7;i++){ const src=dkey(addDays(weekStart,i-7)); const dst=dkey(addDays(weekStart,i));
    if(db.planning[src]) db.planning[dst]=JSON.parse(JSON.stringify(db.planning[src])); }
  save(); renderPlanning(); toast('Semana copiada ✅');
}
function clearWeek(){
  let has=false; for(let i=0;i<7;i++){ if(db.planning[dkey(addDays(weekStart,i))]) has=true; }
  if(!has){ toast('La semana ya está vacía'); return; }
  if(!confirm('¿Vaciar toda la planificación de esta semana?')) return;
  for(let i=0;i<7;i++){ delete db.planning[dkey(addDays(weekStart,i))]; }
  save(); renderPlanning(); toast('Semana vaciada');
}

  for(let i=0;i<7;i++){

    html += `<div class="dayrow ${k===todayK?'today':''}">

    MEALS.forEach(([m,lbl])=>{

      html += `<div class="mslot"><div class="ml">${lbl}</div>
        <button class="pick ${filled?'':'empty'}" onclick="pickRecipe('${k}','${m}')">
          ${rec?`<span class="dot c-${rec.cat}"></span><span class="nm">${esc(rec.title)}${gb?`<span class="pgrp">${gb.icon||'📁'} ${esc(gb.name)}</span>`:''}${slot.leftover?`<span class="pgrp">♻️ sobras</span>`:''}</span>`
            : isCustom?`<span class="dot" style="background:var(--muted2)"></span><span class="nm">${esc(slot.title)}<span class="pgrp">✏️ a mano</span>${slot.leftover?`<span class="pgrp">♻️ sobras</span>`:''}</span>`
            : '<span class="nm">＋ Añadir</span>'}
        </button>
        ${filled?`<select class="diners" onchange="setDiners('${k}','${m}',this.value)" title="Comensales">${[1,2,3,4,5,6,7,8].map(n=>`<option value="${n}" ${slot.diners==n?'selected':''}>${n} 👤</option>`).join('')}</select>`:''}
      </div>`;
    });
    html += `</div></div>`;
  }
  html += `<div class="row-btns" style="margin:6px 0 0"><button class="btn ghost sm" onclick="copyPlanning()">📋 Copiar menú</button><button class="btn ghost sm" onclick="sharePlanningWA()">🟢 Enviar por WhatsApp</button></div>`;
  document.getElementById('planDays').innerHTML=html;
}

function getWeekShot(){ const id=db.shotWeek[dkey(weekStart)]; return id?db.despertar.find(d=>d.id===id):null; }
const SHOT_DAYS=7;
function scaleLine(line, mult){
  const m=line.match(/(\d+\s*\/\s*\d+|\d+(?:[.,]\d+)?)/);
  if(!m) return mult+'× '+line;
  const tok=m[1].replace(/\s/g,'').replace(',','.');
  let val; if(tok.includes('/')){ const p=tok.split('/'); val=parseFloat(p[0])/parseFloat(p[1]); } else val=parseFloat(tok);
  const r=Math.round(val*mult*100)/100;
  return line.slice(0,m.index)+r+line.slice(m.index+m[1].length);
}
function shotWeekIngredients(){ const d=getWeekShot(); if(!d) return []; return d.ingredientes.map(l=>scaleLine(l,SHOT_DAYS)); }
function setWeekShot(id){ db.shotWeek[dkey(weekStart)]=id; save(); closeModal(); renderDespertar(); toast('Elegido ✅ · ingredientes añadidos a la compra'); }

let pendingSlot=null;
function parseIngLine(raw){
  raw=(raw||'').replace(/\u00a0/g,' ').replace(/^[\s\-•*·–]+/,'').trim();
  if(!raw) return {name:'',qty:0,unit:'',section:'Otros'};
  raw=raw.replace(/^(\d+(?:[.,]\d+)?)([a-zA-Z])/,'$1 $2');
  const FR={'½':0.5,'¼':0.25,'¾':0.75,'⅓':1/3,'⅔':2/3,'⅛':0.125,'⅕':0.2};
  const WORD={'un':1,'una':1,'uno':1,'dos':2,'tres':3,'cuatro':4,'cinco':5,'seis':6,'siete':7,'ocho':8,'diez':10,'medio':0.5,'media':0.5,'par':2};
  const KNOWN=['g','gr','gramo','gramos','kg','kilo','kilos','ml','cl','l','litro','litros','taza','tazas','cucharada','cucharadas','cucharadita','cucharaditas','cda','cdas','cdta','cdtas','ud','uds','unidad','unidades','diente','dientes','lata','latas','bote','botes','filete','filetes','loncha','lonchas','rebanada','rebanadas','manojo','manojos','sobre','sobres','hoja','hojas','pizca','pizcas','puñado','puñados','rodaja','rodajas','vaso','vasos','ramita','ramitas','trozo','trozos','chorro','chorrito','lata'];
  let qty=0, unit='', name=raw, mm;
  if((mm=raw.match(/^(\d+(?:[.,]\d+)?)\s*\/\s*(\d+)\s+(.*)$/))){ qty=parseFloat(mm[1].replace(',','.'))/parseFloat(mm[2]); name=mm[3]; }
  else if((mm=raw.match(/^(\d+(?:[.,]\d+)?)\s*(?:[-aá]|a)\s*\d+(?:[.,]\d+)?\s+(.*)$/))){ qty=parseFloat(mm[1].replace(',','.')); name=mm[2]; }
  else if((mm=raw.match(/^([½¼¾⅓⅔⅛⅕])\s+(.*)$/))){ qty=FR[mm[1]]; name=mm[2]; }
  else if((mm=raw.match(/^(\d+(?:[.,]\d+)?)\s+(.*)$/))){ qty=parseFloat(mm[1].replace(',','.')); name=mm[2]; }
  else {
    const w=raw.split(/\s+/); const f=w[0].toLowerCase().replace(/[.,]/g,'');
    if(WORD[f]!==undefined && w.length>1){ qty=WORD[f]; name=w.slice(1).join(' '); }
  }
  name=name.trim();
  const w2=name.split(/\s+/);
  if(w2.length>1 && KNOWN.includes(w2[0].toLowerCase().replace(/[.,]/g,''))){ unit=w2[0].replace(/[.,]/g,''); name=w2.slice(1).join(' '); }
  name=name.replace(/^de\s+/i,'').replace(/^\(.*?\)\s*/,'').trim();
  if(!name){ name=raw; qty=0; unit=''; }
  return {name, qty:qty||0, unit, section:guessSection(name)};
}

function fmtQty(q){
  if(!q||q===0) return '';
  if(Number.isInteger(q)) return q.toString();
  return (Math.round(q*10)/10).toString().replace('.',',');
}
function smartRound(qty, unit){
  const u=(unit||'').toLowerCase();
  if(COUNTABLE.includes(u) || u===''){ return Math.max(qty>0?1:0, Math.ceil(qty-0.001)); } // unidades enteras, redondeo arriba
  // granel: redondear a entero si grande, 1 decimal si pequeño
  if(qty>=20) return Math.round(qty);
  return Math.round(qty*10)/10;
}
function shoppingText(){
  const bySec=buildShopping(); const out=['🛒 Lista de la compra ('+weekLabel()+')',''];
  [...SECTIONS,"Despertar ☀️"].forEach(sec=>{ const items=(bySec[sec]||[]); if(!items.length) return;
    out.push('— '+sec+' —'); items.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(it=>{ out.push('• '+it.name+(it.qty?' ('+fmtQty(it.qty)+' '+it.unit+')':'')); }); out.push(''); });
  return out.join('\n');
}

function removePantry(i){ db.pantry.splice(i,1); save(); openPantry(); }
function buildShopping(){
  const agg={}; // key name|unit
  const pantry=new Set((db.pantry||[]).map(s=>s.toLowerCase().trim()));
  for(let i=0;i<7;i++){
    const k=dkey(addDays(weekStart,i)); const day=db.planning[k]; if(!day) continue;
    MEALS.forEach(([m])=>{
      const slot=day[m]; if(!slot) return;
      if(slot.leftover) return; // sobras: ya cocinado, no se compra
      let ings, base;
      if(slot.custom){ ings=slot.ingredients||[]; base=slot.base||slot.diners||1; }
      else { const r=db.recipes.find(x=>x.id===slot.recipeId); if(!r) return; ings=r.ingredients; base=r.baseServings||1; }
      const factor = slot.diners / (base||1);
      ings.forEach(ing=>{
        if(pantry.has(ing.name.toLowerCase().trim())) return;
        const key=(ing.name.toLowerCase())+'|'+(ing.unit||'').toLowerCase();
        if(!agg[key]) agg[key]={name:ing.name,unit:ing.unit,section:ing.section||'Otros',qty:0};
        agg[key].qty += (ing.qty||0)*factor;
      });
    });
  }
  // agrupar por sección
  const bySec={};
  Object.entries(agg).forEach(([key,it])=>{
    it.qty = smartRound(it.qty, it.unit);
    const id='r:'+key;
    (bySec[it.section]=bySec[it.section]||[]).push({...it,id});
  });
  // extras (no-comida y manuales) por su sección
  (db.extras||[]).forEach(e=>{ (bySec[e.section]=bySec[e.section]||[]).push({name:e.name,unit:'',qty:0,section:e.section,id:'e:'+e.id,isExtra:true,extraId:e.id}); });
  shotWeekIngredients().forEach((line,idx)=>{ (bySec["Despertar ☀️"]=bySec["Despertar ☀️"]||[]).push({name:line,unit:'',qty:0,section:"Despertar ☀️",id:'shot:'+idx}); });
  return bySec;
}

  document.getElementById('weekLbl2').textContent = weekLabel();

        ${it.isExtra?`<button class="del" onclick="event.stopPropagation();removeExtra('${it.extraId}')">✕</button>`:''}
      </div>`;

  if(!html) html=`<div class="empty">Tu lista está vacía.<br>Planifica comidas en la pestaña Planning y aparecerán aquí los ingredientes. También puedes añadir cosas sueltas arriba.</div>`;
  else html += `<div class="row-btns" style="margin:0 0 10px"><button class="btn ghost sm" onclick="copyShopping()">📋 Copiar lista</button><button class="btn ghost sm" onclick="shareWhatsApp()">🟢 WhatsApp</button></div><button class="btn ghost block" onclick="clearChecked()">🧹 Quitar lo ya comprado</button>`;
  document.getElementById('shopList').innerHTML=html;
}

/* ============================================================
   SALUD / EQUILIBRIO
   ============================================================ */
function renderSalud(){
  // analizar semana
  const counts={pescado:0,vegano:0,vegetariano:0,carne:0}; let total=0;
  for(let i=0;i<7;i++){
    const day=db.planning[dkey(addDays(weekStart,i))]; if(!day) continue;
    MEALS.forEach(([m])=>{ const s=day[m]; if(!s) return; const r=db.recipes.find(x=>x.id===s.recipeId); if(r){ counts[r.cat]++; total++; } });
  }
  const veggie = counts.vegano+counts.vegetariano;
  const colors={pescado:'var(--fish)',vegano:'var(--veg)',vegetariano:'var(--egg)',carne:'var(--meat)'};
  let bars='';
  Object.entries(CATS).forEach(([k,v])=>{
    const pct = total? Math.round(counts[k]/total*100):0;
    bars += `<div class="bar"><div class="blab"><span>${v}</span><span>${counts[k]} comida${counts[k]!==1?'s':''} · ${pct}%</span></div>
      <div class="track"><div class="fill" style="width:${pct}%;background:${colors[k]}"></div></div></div>`;
  });

  let score=null, tips=[], goals=[];
  if(total>0){
    const vegPct=veggie/total;
    const gPescado = counts.pescado>=2;
    const gVeggie = vegPct>=0.5;
    const gCarne = counts.carne<=2;
    const sP = gPescado?34:Math.round(Math.min(1,counts.pescado/2)*34);
    const sV = gVeggie?33:Math.round(Math.min(1,vegPct/0.5)*33);
    const sC = gCarne?33:Math.max(0,33-(counts.carne-2)*12);
    score=Math.max(0,Math.min(100,Math.round(sP+sV+sC)));
    goals=[
      ['🐟','Pescado 2-3 veces/semana', counts.pescado+' comida'+(counts.pescado!==1?'s':''), gPescado],
      ['🥦','Mitad vegetal/legumbre', Math.round(vegPct*100)+'%', gVeggie],
      ['🥩','Carne puntual (≤2)', counts.carne+' comida'+(counts.carne!==1?'s':''), gCarne],
    ];
    if(!gPescado) tips.push(['🐟','Mete más pescado: las guías recomiendan al menos 2-3 raciones por semana, 1-2 de pescado azul (omega-3).']);
    if(!gVeggie) tips.push(['🥦','Sube las verduras y legumbres: lo ideal es que sean la base (medio plato) en la mayoría de comidas.']);
    if(!gCarne) tips.push(['🥩','Vas con bastante carne. Las guías la limitan (roja 1-2/semana máx.); cámbiala por legumbre, huevo o pescado.']);
    if(total<10) tips.push(['📅','Te faltan comidas por planificar; complétalas para que el equilibrio sea real.']);
    if(!tips.length) tips.push(['✅','¡Semana muy equilibrada según las guías! Pescado, base vegetal y poca carne.']);
  }

  let weakest='pescado', min=Infinity;
  ['pescado','vegano','vegetariano'].forEach(k=>{ if(counts[k]<min){min=counts[k];weakest=k;} });
  const sugg = db.recipes.filter(r=>r.cat===weakest && !r.blockIds.includes('probar')).slice(0,6);
  const suggHtml = sugg.length? `<div class="rgrid">`+sugg.map(r=>cardHtml(r)).join('')+`</div>` : `<div class="hint">Añade más recetas de ${CATS[weakest].toLowerCase()} (fuera de “Por probar”) para tener sugerencias aquí.</div>`;

  let html = `
    <div class="panel">
      <h3>Equilibrio de la semana</h3>
      ${total? `<div class="score" style="color:${score>=80?'var(--acc)':score>=60?'var(--warn)':'var(--danger)'}">${score}</div><div class="score-lbl">de 100 · ${weekLabel()}</div><div class="divider"></div>${bars}`
        : `<div class="empty">Aún no has planificado nada esta semana. Ve a Planning y añade comidas para ver tu equilibrio.</div>`}
    </div>`;
  if(goals.length){
    html += `<div class="panel"><h3>Objetivos de la semana</h3>${goals.map(g=>`<div class="tip"><span class="ic">${g[3]?'✅':'⬜'}</span><span><b>${g[1]}</b> — llevas ${g[2]}</span></div>`).join('')}<div class="tip" style="border-top:1px solid var(--line)"><span class="ic">📚</span><span>Referencia: Plato de Harvard y guías AESAN/SENC (½ plato verdura, ¼ integral, ¼ proteína priorizando pescado y legumbre).</span></div></div>`;
  }
  if(tips.length){
    html += `<div class="panel"><h3>Consejos</h3>${tips.map(t=>`<div class="tip"><span class="ic">${t[0]}</span><span>${t[1]}</span></div>`).join('')}</div>`;
  }
  html += `<div class="panel"><h3>Te puede encajar — ${CATS[weakest]}</h3>${suggHtml}</div>`;
  html += `<div class="panel"><h3>Tu estilo de alimentación</h3>
    <div class="tip"><span class="ic">🌱</span><span>Base vegetariana: legumbres, verduras, cereales integrales.</span></div>
    <div class="tip"><span class="ic">🥚</span><span>Huevo y lácteos como proteína fácil y completa.</span></div>
    <div class="tip"><span class="ic">🐟</span><span>Pescado varias veces por semana, prioriza el azul.</span></div>
    <div class="tip"><span class="ic">🥩</span><span>Carne solo puntualmente, mejor de calidad.</span></div></div>`;
  document.getElementById('saludContent').innerHTML=html;
}

const HKEY=STORE+'_hist';
function loadHist(){ try{ return JSON.parse(localStorage.getItem(HKEY))||[]; }catch(e){ return []; } }
function snapshot(reason){
  let hist=loadHist(); const data=JSON.stringify(db);
  if(hist.length && hist[hist.length-1].data===data) return;
  hist.push({ts:Date.now(),reason:reason||'',data});
  while(hist.length>3) hist.shift();
  try{ localStorage.setItem(HKEY,JSON.stringify(hist)); }
  catch(e){ while(hist.length>1){ hist.shift(); try{ localStorage.setItem(HKEY,JSON.stringify(hist)); break; }catch(e2){} } }
}
function histHtml(){
  const hist=loadHist();
  if(!hist.length) return '<p class="hint">Aún no hay versiones. Se crean solas al abrir la app y al hacer copias.</p>';
  return hist.slice().reverse().map((it,ri)=>{ const i=hist.length-1-ri; const d=new Date(it.ts);
    return `<div class="item"><span class="nm">${d.toLocaleDateString('es-ES')} ${d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}${it.reason?' · '+esc(it.reason):''}</span><button class="btn ghost sm" onclick="restoreHist(${i})">Restaurar</button></div>`;
  }).join('');
}
function restoreHist(i){
  const hist=loadHist(); const it=hist[i]; if(!it) return;
  if(!confirm('¿Restaurar la versión del '+new Date(it.ts).toLocaleString('es-ES')+'? Reemplaza tus datos actuales.')) return;
  snapshot('antes de restaurar');
  db=ensureDefaults(JSON.parse(it.data)); save(); closeModal(); currentBlock=null; go('recetas'); checkBackup(); toast('Versión restaurada ✅');
}

async function cloudSync(){

    }

}
async function cloudSignIn(email,pass){
  if(!sb){ toast('Nube no disponible'); return; }
  email=(email||'').trim(); if(!email||!pass){ toast('Pon email y contraseña'); return; }
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){ toast(error.message); return; }
  cloudUser=data.user; await cloudSync(); toast('Sesión iniciada ✅'); openSettings();
}
async function cloudSignUp(email,pass){
  if(!sb){ toast('Nube no disponible'); return; }
  email=(email||'').trim(); if(!email||(pass||'').length<6){ toast('Email y contraseña (mín. 6)'); return; }
  const {data,error}=await sb.auth.signUp({email,password:pass});
  if(error){ toast(error.message); return; }
  if(data.session){ cloudUser=data.session.user; }
  else { const r=await sb.auth.signInWithPassword({email,password:pass}); if(r.error){ toast('Cuenta creada. Si pide confirmar email, revísalo y luego pulsa Entrar.'); return; } cloudUser=r.data.user; }
  await cloudPushNow(); toast('Conectado a la nube ✅'); openSettings();
}
async function cloudSignOut(){ if(sb) await sb.auth.signOut(); cloudUser=null; toast('Sesión cerrada'); openSettings(); }
async function cloudPushNow(){ if(!sb||!cloudUser) return; try{ await sb.from('user_backups').upsert({user_id:cloudUser.id,data:db,updated_at:new Date(db.updatedAt||Date.now()).toISOString()}); }catch(e){ console.warn('push',e); } }
let cloudTimer=null;
function cloudPush(){ if(!sb||!cloudUser) return; clearTimeout(cloudTimer); cloudTimer=setTimeout(cloudPushNow,1500); }
async function cloudPushManual(){ if(!sb||!cloudUser){ toast('Inicia sesión primero'); return; } db.updatedAt=Date.now(); await cloudPushNow(); toast('Guardado en la nube ✅'); }

function openSettings(){

  const days = lb? Math.floor((Date.now()-lb)/86400000) : null;
  const status = lb? `Última copia: ${days===0?'hoy':'hace '+days+' día'+(days===1?'':'s')}.` : 'Aún no has hecho ninguna copia.';

    <div style="height:12px"></div>
    <button class="btn block" onclick="exportBackup()">⬇️ Descargar copia de seguridad</button>
    <div style="height:10px"></div>
    <label class="btn ghost block" style="text-align:center;cursor:pointer">⬆️ Importar una copia<input type="file" accept="application/json,.json" style="display:none" onchange="importBackup(this)"></label>

   </div>`);

function exportBackup(){
  db.lastBackup=Date.now(); save(); snapshot('copia'); checkBackup();
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  a.href=url; a.download='mi-cocina-backup-'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast('Copia descargada ✅'); openSettings();
}
function importBackup(input){
  const f=input.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=e=>{
    let r; try{ r=JSON.parse(e.target.result); }catch(err){ toast('No se pudo leer el archivo'); return; }
    if(!r||!Array.isArray(r.recipes)){ toast('El archivo no es una copia válida'); return; }
    if(!confirm('Esto reemplazará tus datos actuales por los de la copia. ¿Continuar?')) return;
    db=ensureDefaults(r); save(); closeModal(); currentBlock=null; go('recetas'); checkBackup(); toast('Copia restaurada ✅');
  };
  rd.readAsText(f);
}
function checkBackup(){ const b=document.getElementById('setBtn'); if(!b) return; const lb=db.lastBackup; const stale=!lb || (Date.now()-lb)/86400000>=14; b.classList.toggle('alert',stale); }
